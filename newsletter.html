<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Tips Newsletter - Weekly Coding Insights</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 10px; padding: 40px; max-width: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 5px rgba(102, 126, 234, 0.3); }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #764ba2; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .benefits { background: #f5f5f5; padding: 20px; border-radius: 5px; margin: 20px 0; border-left: 4px solid #667eea; }
        .benefits ul { margin-left: 20px; }
        .benefits li { margin: 8px 0; color: #333; }
        .message { text-align: center; padding: 15px; border-radius: 5px; margin-top: 15px; display: none; }
        .success { background: #d4edda; color: #155724; display: none; }
        .error { background: #f8d7da; color: #721c24; display: none; }
        small { color: #999; display: block; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Developer Tips</h1>
        <p class="subtitle">Weekly insights on coding & side hustles</p>
        
        <div class="benefits">
            <ul>
                <li>✓ Weekly tutorials & code insights</li>
                <li>✓ Free tools & resources</li>
                <li>✓ How to build side projects</li>
                <li>✓ Community tips</li>
            </ul>
        </div>
        
        <form id="newsletter-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <button type="submit" id="submit-btn">Subscribe (Free)</button>
        </form>
        
        <div class="message success" id="success-message">
            ✓ Subscribed! Check your email.
        </div>
        <div class="message error" id="error-message">
            ✗ Something went wrong. Try again.
        </div>
        
        <small>No spam. Unsubscribe anytime. ~1 email per week.</small>
    </div>

    <script>
        document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submit-btn');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Subscribing...';
            
            try {
                // Try Basin.com first (no authentication needed)
                const response = await fetch('https://usebasin.com/f/lucasmdev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, timestamp: new Date().toISOString() })
                });
                
                if (response.ok) {
                    document.getElementById('newsletter-form').style.display = 'none';
                    document.getElementById('success-message').style.display = 'block';
                } else {
                    throw new Error('Form submission failed');
                }
            } catch (error) {
                console.error(error);
                document.getElementById('error-message').style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Subscribe (Free)';
            }
        });
    </script>
</body>
</html>
